<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tableau de bord — Méta-analyse API Management</title>
  <meta name="description" content="Comparaison de plateformes d'API Management sur trois évaluations indépendantes (juin 2026). Organisation fictive, réponses simulées.">
  <link rel="stylesheet" href="assets/theme.css">
  <style>
    /* ---- Mise en page propre au tableau de bord ---- */
    .topbar{ position:sticky; top:0; z-index:20; backdrop-filter:saturate(140%) blur(10px);
      background:color-mix(in srgb,var(--bg) 86%, transparent); border-bottom:1px solid var(--border); }
    .topbar .wrap{ display:flex; flex-wrap:wrap; align-items:center; gap:14px 20px; padding-top:14px; padding-bottom:14px; }
    .brand{ display:flex; flex-direction:column; line-height:1.2; margin-right:auto; }
    .brand b{ color:var(--orange-bright); font-size:1.02rem; font-weight:700; letter-spacing:-.01em; }
    .brand span{ color:var(--text-muted); font-size:.82rem; }
    .seg{ display:inline-flex; gap:6px; flex-wrap:wrap; }
    .toolbar{ border-bottom:1px solid var(--border); background:var(--surface); }
    .toolbar .wrap{ display:flex; flex-wrap:wrap; gap:10px 26px; align-items:center; padding-top:12px; padding-bottom:12px; }
    .ctrl{ display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
    .ctrl > .lbl{ color:var(--text-muted); font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; }

    main.wrap{ padding-top:26px; padding-bottom:60px; }
    .kpis{ margin:0 0 26px; }
    .grid{ display:grid; gap:20px; grid-template-columns:1fr; }
    @media (min-width:1024px){ .grid{ grid-template-columns:1fr 1fr; } .grid .span2{ grid-column:1 / -1; } }
    .panel{ padding:20px 22px; }
    .panel > header{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
    .panel h3{ margin:0; }
    .panel .hint{ color:var(--text-muted); font-size:.82rem; }
    .legend{ display:flex; flex-wrap:wrap; gap:8px 14px; margin-top:14px; }
    .legend .item{ display:inline-flex; align-items:center; gap:7px; font-size:.85rem; color:var(--text-muted); }
    .legend .sw{ width:13px; height:13px; border-radius:4px; flex:0 0 auto; }
    .annot{ font-size:.85rem; color:var(--text); background:color-mix(in srgb,var(--orange) 9%,transparent);
      border-left:3px solid var(--orange); padding:8px 12px; border-radius:0 8px 8px 0; margin-top:14px; }
    .crit-table{ margin-top:14px; overflow-x:auto; }
    .why{ display:grid; gap:14px; grid-template-columns:1fr; margin-top:6px; }
    @media (min-width:720px){ .why{ grid-template-columns:repeat(3,1fr); } }
    .why .lever{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; }
    .why .lever b{ color:var(--orange-bright); display:block; margin-bottom:6px; }
    .why .lever p{ margin:0; font-size:.9rem; color:var(--text); }
    .warnbox{ border:1px solid color-mix(in srgb,var(--warning) 40%,transparent);
      background:color-mix(in srgb,var(--warning) 8%,transparent); border-radius:var(--radius-sm); padding:12px 16px; color:var(--text); font-size:.9rem; }
    .res-grid{ display:grid; gap:14px; grid-template-columns:1fr; }
    @media (min-width:680px){ .res-grid{ grid-template-columns:repeat(2,1fr); } }
    @media (min-width:1100px){ .res-grid{ grid-template-columns:repeat(3,1fr); } }
    .res-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; }
    .res-card h4{ margin:0 0 8px; display:flex; align-items:center; gap:9px; font-size:1rem; color:var(--text); }
    .res-card ul{ margin:0; padding-left:18px; }
    .res-card li{ font-size:.86rem; color:var(--text-muted); margin-bottom:5px; }
    footer.intg{ border-top:1px solid var(--border); background:var(--surface); }
    footer.intg .wrap{ padding:22px 0 40px; color:var(--text-muted); font-size:.84rem; }
    footer.intg a{ color:var(--orange-bright); }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Aller au contenu</a>
  <div class="atmos" aria-hidden="true"></div>

  <header class="topbar">
    <div class="wrap">
      <div class="brand">
        <b id="brandTitle">Méta-analyse · API Management</b>
        <span id="brandSub">Tableau de bord exécutif — juin 2026</span>
      </div>
      <nav class="seg" id="simTabs" aria-label="Simulation active"></nav>
      <div class="seg" style="gap:10px; align-items:center">
        <div class="seg" id="langToggle" role="group" aria-label="Langue"></div>
        <a class="btn" id="toLanding" href="index.html">Présentation</a>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="wrap">
      <div class="ctrl" id="scenarioCtrl"></div>
      <div class="ctrl" id="focusCtrl"></div>
    </div>
  </div>

  <main class="wrap" id="main">
    <section class="kpis" id="kpiBand" aria-label="Indicateurs clés"></section>
    <div id="panels"></div>
  </main>

  <footer class="intg">
    <div class="wrap" id="integrity"></div>
  </footer>

  <script src="assets/data.js"></script>
  <script src="assets/charts.js"></script>
  <script src="assets/dashboard.js"></script>
</body>
</html>
